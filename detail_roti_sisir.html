<!DOCTYPE html>
<html>
<head>
    <title>Detail Roti sisir</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="detail-produk">

    <h1>Roti sisir</h1>

    <img src="roti3.jpeg" alt="Roti sisir" width="350">

    <h3>Rp 25.000</h3>

    <p>
        Roti sisir dengan tekstur super lembut, serat roti yang halus, dan aroma mentega<br>
        yang menggugah selera. Mudah disobek per bagian sehingga praktis dinikmati bersama<br>
        keluarga. Cocok untuk sarapan, bekal, atau camilan kapan saja.<br>
    </p>

    <br>

    label>Jumlah:</label>

    <button onclick="kurang()">-</button>

    <input type="text" id="jumlah" value="1" readonly>

    <button onclick="tambah()">+</button>
</div>

<br><br>

    <a href="sukses.html" class="btn btn-warning">
        Buat pesanan
    </a>

    <br><br><br>

    <a href="form_produk.html" class="btn btn-secondary">
        Kembali ke Produk
    </a>

</section>

<script>
function tambah() {
    let jumlah = document.getElementById("jumlah");
    jumlah.value = parseInt(jumlah.value) + 1;
}

function kurang() {
    let jumlah = document.getElementById("jumlah");

    if (jumlah.value > 1) {
        jumlah.value = parseInt(jumlah.value) - 1;
    }
}
</script>


</body>
</html>
